name: Publish to NPM

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            version:
                description: "Version to publish (e.g., 0.4.1)"
                required: true

jobs:
    build-and-publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write

        steps:
            - name: 📥 Checkout source repository
              uses: actions/checkout@v4

            - name: 🔧 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  registry-url: "https://registry.npmjs.org"

            - name: 📦 Install dependencies
              run: npm install

            - name: 📋 Update package name and version
              run: |
                  # Get version from release tag or input
                  if [ "${{ github.event_name }}" = "release" ]; then
                    VERSION="${{ github.event.release.tag_name }}"
                    # Remove 'v' prefix if present
                    VERSION=${VERSION#v}
                  else
                    VERSION="${{ github.event.inputs.version }}"
                  fi

                  # Update package.json with new name and version
                  node -e "
                    const fs = require('fs');
                    const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                    pkg.name = '@orca-pt/cli';
                    pkg.version = '${VERSION}';
                    fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
                  "

            - name: 🔍 Verify package
              run: |
                  echo "Package name: $(node -p "require('./package.json').name")"
                  echo "Package version: $(node -p "require('./package.json').version")"
                  echo "Files to publish:"
                  node -p "require('./package.json').files.join('\n')"

            - name: 📤 Publish to NPM
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  npm publish --access public

            - name: ✅ Success notification
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                    VERSION="${{ github.event.release.tag_name }}"
                    VERSION=${VERSION#v}
                  else
                    VERSION="${{ github.event.inputs.version }}"
                  fi
                  echo "✅ Package published successfully to NPM!"
                  echo "📦 Package: @orca-pt/cli"
                  echo "🔖 Version: ${VERSION}"
                  echo "📅 Date: $(date)"
